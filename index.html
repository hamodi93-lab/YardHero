<!DOCTYPE html>
<html>
<head>
<title>YardHero</title>
<style>
body { font-family: Arial; background:#0f172a; color:white; text-align:center; }
h1 { color:#22c55e; }
.box { background:#1e293b; padding:20px; margin:20px; border-radius:10px; }
</style>
</head>

<body>

<h1>YardHero</h1>
<p>The fastest way to book yard services</p>

<div class="box">
<h2>Services</h2>
<p>Lawn Care • Snow Removal • Cleanup</p>
</div>

<div class="box">
<h2>Estimate</h2>

<select id="service">
<option>Lawn Care</option>
<option>Snow Removal</option>
</select>

<select id="size">
<option>Small</option>
<option>Medium</option>
<option>Large</option>
</select>

<h3 id="price">$55 - $95</h3>
</div>

<script>
const s = document.getElementById("service");
const z = document.getElementById("size");
const p = document.getElementById("price");

function update(){
if(s.value==="Lawn Care"){
if(z.value==="Small") p.innerText="$35 - $65";
if(z.value==="Medium") p.innerText="$55 - $95";
if(z.value==="Large") p.innerText="$85 - $150";
}
if(s.value==="Snow Removal"){
if(z.value==="Small") p.innerText="$30 - $55";
if(z.value==="Medium") p.innerText="$45 - $80";
if(z.value==="Large") p.innerText="$70 - $120";
}
}

s.onchange = update;
z.onchange = update;
</script>

</body>
</html>
